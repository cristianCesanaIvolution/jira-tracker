<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Settings</title>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .container { padding: 20px; }
    .section { margin-bottom: 18px; }
    .section h3 { margin-bottom: 8px; }
    .actions { display: flex; gap: 10px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Jira Time Tracker — Settings</h2>

    <div id="banner" class="banner info" style="display:none"></div>

    <div class="section card">
      <h3>Atlassian / Jira</h3>
      <div class="field">
        <label>Workspace URL</label>
        <input id="jira_base_url" type="text" placeholder="tuonome.atlassian.net" />
        <span class="muted">Es: <code>azienda.atlassian.net</code></span>
      </div>
      <div class="field">
        <label>Email</label>
        <input id="jira_email" type="email" placeholder="utente@example.com" />
      </div>
      <div class="field">
        <label>API Token</label>
        <input id="jira_api_token" type="password" placeholder="API token" />
        <span class="muted">Generalo da <code>id.atlassian.com → Manage Profile → Security → API tokens</code></span>
      </div>
      <button id="btnValidate">Test connection</button>
    </div>

    <div class="section card">
      <h3>Tempo (opzionale)</h3>
      <div class="field">
        <label>Tempo Token</label>
        <input id="tempo_token" type="password" placeholder="Tempo API token (opzionale)" />
      </div>
    </div>

    <div class="section card">
      <h3>Tracking</h3>
      <div class="field">
        <label>Intervallo prompt (minuti)</label>
        <input id="interval" type="number" min="1" max="240" />
      </div>
      <div class="row">
        <input id="autostart" type="checkbox" />
        <label for="autostart">Avvia automaticamente all'accensione</label>
      </div>
    </div>

    <div class="actions">
      <button id="btnSave" class="primary">Salva</button>
      <button id="btnClose">Chiudi</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
